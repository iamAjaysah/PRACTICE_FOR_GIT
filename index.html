<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Hunter Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #555;

        .target {
            margin-bottom: 20px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }

        .box {
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .box:hover {
            transform: scale(1.05);
        }
        button {
            padding: 12px 25px;
            margin-top: 15px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            width: 100%;
        }
        button:hover {
            background: #4f63d8;

        #message {
            font-weight: bold;
            font-size: 20px;
            margin-top: 15px;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🎯 Color Hunter</h1>
        
        <div class="info">
            <span>Score: <span id="score">0</span></span>
            <span>Time: <span id="time">30</span>s</span>
        </div>

        <div class="target">
        </div>

        <div class="grid" id="grid"></div>

        <div id="message"></div>

        <button onclick="startGame()">Start Game</button>
    </div>

<script>
    // उपलब्ध रंगों की लिस्ट
    const colors = [
        "red", "blue", "green", "yellow",
        "purple", "orange", "pink", "brown",
        "cyan", "lime", "gold", "magenta"
    ];

    const grid = document.getElementById("grid");
    let targetColor = "";
    let score = 0;
    let timeLeft = 30;
    let timer = null;
    let gameActive = false;

    function generateBoxes() {
        grid.innerHTML = "";
        let selected = [];

        // 1. हमेशा 6 अलग-अलग रैंडम कलर्स चुनना
        while (selected.length < 6) {
            let random = colors[Math.floor(Math.random() * colors.length)];
            if (!selected.includes(random)) {
                selected.push(random);
            }
        }

        // 2. इन 6 में से किसी एक को टारगेट कलर बनाना
        targetColor = selected[Math.floor(Math.random() * selected.length)];
        document.getElementById("targetColor").innerText = targetColor.toUpperCase();

        // 3. ग्रिड में डिब्बे (Boxes) तैयार करना
        selected.forEach(color => {
            const box = document.createElement("div");
            box.classList.add("box");
            box.style.background = color;

            // बॉक्स पर क्लिक करने का लॉजिक
            box.addEventListener("click", () => {
                if (!gameActive || timeLeft <= 0) return;

                if (color === targetColor) {
                    score += 10;
                    document.getElementById("message").innerHTML = "✅ Correct!";
                    document.getElementById("message").style.color = "green";
                } else {
                    score -= 5;
                    document.getElementById("message").innerHTML = "❌ Wrong!";
                    document.getElementById("message").style.color = "red";
                }

                document.getElementById("score").innerText = score;
                generateBoxes(); // सही या गलत के बाद नए बॉक्स जनरेट करना
            });

            grid.appendChild(box);
        });
    }

    function startGame() {
        clearInterval(timer);
        score = 0;
        timeLeft = 30;
        gameActive = true;

        document.getElementById("score").innerText = score;
        document.getElementById("time").innerText = timeLeft;
        document.getElementById("message").innerText = "Game Started! Hunt the color!";
        document.getElementById("message").style.color = "#333";

        generateBoxes();

        // 1 सेकंड का टाइमर चालू करना
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("time").innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                gameActive = false;
                document.getElementById("message").innerHTML = `🏆 Game Over! Final Score: ${score}`;
                document.getElementById("message").style.color = "#764ba2";
            }
        }, 1000);
    }

    // जब पहली बार पेज खुले, तो खाली बॉक्स न दिखें इसलिए शुरुआती ग्रिड लोड करना
    generateBoxes();
</script>

</body>
